<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elen Cantikk 💚</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--gd:#1a4a3a;--gm:#2d6a4f;--gl:#52b788;--gold:#d4a017;--gold2:#f0c040;--cream:#fdf8f0;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);min-height:100vh;overflow:hidden;}

  /* REGISTER */
  #reg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;z-index:10;}
  .card{background:white;border-radius:28px;padding:44px 36px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(26,74,58,.2);text-align:center;position:relative;animation:up .5s cubic-bezier(.34,1.56,.64,1);}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--gd),var(--gold),var(--gl));border-radius:28px 28px 0 0;}
  @keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .ring{width:110px;height:110px;border-radius:50%;margin:0 auto 18px;padding:4px;background:linear-gradient(135deg,var(--gold),var(--gl),var(--gold2));box-shadow:0 8px 24px rgba(212,160,23,.4);animation:pulse 2.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 8px 24px rgba(212,160,23,.35)}50%{box-shadow:0 8px 32px rgba(212,160,23,.6),0 0 0 8px rgba(212,160,23,.1)}}
  .ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid white;}
  .reg-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--gd);margin-bottom:4px;}
  .reg-sub{font-size:13px;color:#999;margin-bottom:28px;}
  .inp-wrap{position:relative;margin-bottom:18px;}
  .inp-wrap span{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;}
  .inp-wrap input{width:100%;padding:13px 18px 13px 46px;border:2px solid #e8f4f0;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;color:var(--gd);background:#f7fffe;outline:none;transition:.3s;}
  .inp-wrap input:focus{border-color:var(--gl);background:white;box-shadow:0 0 0 4px rgba(82,183,136,.12);}
  .btn-go{width:100%;padding:14px;background:linear-gradient(135deg,var(--gd),var(--gm));color:white;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:.3s;box-shadow:0 6px 20px rgba(26,74,58,.3);}
  .btn-go:hover{transform:translateY(-2px);}
  .reg-note{margin-top:14px;font-size:12px;color:#bbb;}
  .ganti-btn{margin-top:10px;font-size:12px;color:var(--gm);background:none;border:none;cursor:pointer;text-decoration:underline;}

  /* CHAT */
  #chat{display:none;position:fixed;inset:0;flex-direction:column;z-index:10;}
  .hdr{background:linear-gradient(135deg,var(--gd),var(--gm));padding:12px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(26,74,58,.35);}
  .hdr-av{width:44px;height:44px;border-radius:50%;border:2.5px solid var(--gold);object-fit:cover;flex-shrink:0;}
  .hdr-title{font-family:'Playfair Display',serif;font-size:17px;color:white;}
  .hdr-status{font-size:11px;color:var(--gold2);display:flex;align-items:center;gap:4px;margin-top:2px;}
  .dot-on{width:7px;height:7px;background:#7fff7f;border-radius:50%;animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .hdr-user{margin-left:auto;font-size:11px;color:rgba(255,255,255,.7);text-align:right;}
  .logout-btn{font-size:11px;color:var(--gold2);background:none;border:none;cursor:pointer;margin-top:2px;text-decoration:underline;}

  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:linear-gradient(180deg,#f5fcf8,#fdf8f0);}
  .msgs::-webkit-scrollbar{width:3px;} .msgs::-webkit-scrollbar-thumb{background:var(--gl);border-radius:3px;}
  .date-div{text-align:center;margin:6px 0;} .date-div span{background:rgba(82,183,136,.15);color:var(--gm);font-size:11px;padding:3px 12px;border-radius:20px;font-weight:700;}
  .bw{display:flex;align-items:flex-end;gap:8px;max-width:80%;animation:fin .25s ease;}
  @keyframes fin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .bw.sent{margin-left:auto;flex-direction:row-reverse;}
  .bav{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0;}
  .bubble{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-wrap:break-word;}
  .bw.received .bubble{background:white;color:#333;border-bottom-left-radius:4px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
  .bw.sent .bubble{background:linear-gradient(135deg,var(--gm),var(--gd));color:white;border-bottom-right-radius:4px;box-shadow:0 4px 14px rgba(26,74,58,.3);}
  .btime{font-size:10px;opacity:.6;margin-top:3px;}
  .bw.received .btime{color:#888;} .bw.sent .btime{color:rgba(255,255,255,.7);text-align:right;}
  .bsender{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:1px;}

  .inp-area{background:white;padding:10px 14px;display:flex;align-items:center;gap:9px;box-shadow:0 -4px 20px rgba(26,74,58,.08);border-top:1px solid rgba(82,183,136,.15);}
  .msg-inp{flex:1;padding:11px 16px;border:2px solid #e8f4f0;border-radius:24px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;background:#f7fffe;transition:.3s;color:#333;}
  .msg-inp:focus{border-color:var(--gl);background:white;box-shadow:0 0 0 3px rgba(82,183,136,.1);}
  .send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gm),var(--gd));color:white;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,74,58,.35);transition:.2s;flex-shrink:0;}
  .send-btn:hover{transform:scale(1.08);} .send-btn:active{transform:scale(.95);}
  .emo-btn{font-size:20px;background:none;border:none;cursor:pointer;padding:4px;}

  .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--gd);color:white;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:999;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .petal{position:fixed;opacity:0;animation:fall linear infinite;pointer-events:none;z-index:0;}
  @keyframes fall{0%{opacity:.6;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(360deg)}}

  /* error box */
  .err-box{background:#fff3f3;color:#c0392b;border:1px solid #f5c6cb;border-radius:10px;padding:10px 14px;font-size:12px;margin-top:10px;display:none;}
</style>
</head>

});
const db = firebase.database();

let me = null, lastDate = '', seen = new Set(), epanel = null, listening = false;

function ftime(ts){ const d=ts?new Date(ts):new Date(); return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function fdate(ts){
  const d=ts?new Date(ts):new Date(), t=new Date(), y=new Date();
  y.setDate(y.getDate()-1);
  if(d.toDateString()===t.toDateString()) return 'Hari ini';
  if(d.toDateString()===y.toDateString()) return 'Kemarin';
  return d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function showErr(m){
  const e=document.getElementById('err-box');
  e.textContent=m; e.style.display='block';
}

function addMsg(snap){
  const d=snap.val(), k=snap.key;
  if(!d||!d.text||!d.user) return;
  if(seen.has(k)) return; seen.add(k);
  const area=document.getElementById('msgs');
  const dt=fdate(d.timestamp);
  if(dt!==lastDate){
    lastDate=dt;
    const dv=document.createElement('div');
    dv.className='date-div';
    dv.innerHTML='<span>'+dt+'</span>';
    area.appendChild(dv);
  }
  const sent=d.user===me;
  const w=document.createElement('div');
  w.className='bw '+(sent?'sent':'received');
  w.innerHTML='<img src="'+PHOTO+'" class="bav" alt="'+esc(d.user)+'">'
    +'<div>'
    +(!sent?'<div class="bsender">'+esc(d.user)+'</div>':'')
    +'<div class="bubble">'+esc(d.text)+'</div>'
    +'<div class="btime">'+ftime(d.timestamp)+'</div>'
    +'</div>';
  area.appendChild(w);
  area.scrollTop=area.scrollHeight;
}

function startChat(username){
  me = username;
  document.getElementById('hdr-uname').textContent = username;
  document.getElementById('reg').style.display='none';
  document.getElementById('chat').style.display='flex';
  // reset
  lastDate=''; seen=new Set();
  document.getElementById('msgs').innerHTML='';
  if(!listening){
    listening=true;
    db.ref('messages').on('child_added', addMsg, function(err){
      showToast('⚠️ Gagal konek database. Cek Firebase Rules!');
      console.error(err);
    });
  }
  document.getElementById('minp').focus();
}

function enterChat(){
  const v=document.getElementById('uname').value.trim();
  if(!v){ showErr('Masukkan username dulu 😊'); return; }
  document.getElementById('err-box').style.display='none';
  // simpan ke localStorage
  try{ localStorage.setItem(STORAGE_KEY, v); }catch(e){}
  startChat(v);
}

function logout(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  me=null;
  document.getElementById('uname').value='';
  document.getElementById('chat').style.display='none';
  document.getElementById('reg').style.display='flex';
}

function sendMsg(){
  const inp=document.getElementById('minp'), txt=inp.value.trim();
  if(!txt||!me) return;
  inp.value='';
  db.ref('messages').push({
    user: me,
    text: txt,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  }).catch(function(err){
    showToast('❌ Gagal kirim! Cek Firebase Rules.');
    console.error(err);
    inp.value = txt; // kembalikan teks
  });
}

const EMOJIS=['❤️','😊','😂','🥰','😘','💚','✨','🌿','😍','🤭','💕','🙈','😆','🫶','🥺','😋'];
function toggleEmoji(){
  if(epanel){ epanel.remove(); epanel=null; return; }
  epanel=document.createElement('div');
  Object.assign(epanel.style,{position:'fixed',bottom:'75px',left:'10px',background:'white',
    borderRadius:'16px',padding:'10px',display:'flex',flexWrap:'wrap',gap:'5px',
    boxShadow:'0 8px 24px rgba(0,0,0,.12)',zIndex:'50',maxWidth:'210px'});
  EMOJIS.forEach(function(e){
    const b=document.createElement('button');
    b.textContent=e;
    b.style.cssText='font-size:21px;background:none;border:none;cursor:pointer;padding:2px';
    b.onclick=function(){ document.getElementById('minp').value+=e; document.getElementById('minp').focus(); epanel.remove(); epanel=null; };
    epanel.appendChild(b);
  });
  document.addEventListener('click',function outsideClick(ev){
    if(epanel&&!epanel.contains(ev.target)&&ev.target.className!=='emo-btn'){ epanel.remove(); epanel=null; document.removeEventListener('click',outsideClick); }
  });
  document.body.appendChild(epanel);
}

function petal(){
  const arr=['🌿','💚','✨','🍃'];
  const el=document.createElement('div');
  el.className='petal';
  el.textContent=arr[~~(Math.random()*arr.length)];
  el.style.left=Math.random()*100+'vw';
  el.style.animationDuration=(7+Math.random()*8)+'s';
  el.style.fontSize=(11+Math.random()*9)+'px';
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); },16000);
}
setInterval(petal,3500);

// AUTO LOGIN — cek localStorage saat halaman dibuka
(function(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      document.getElementById('uname').value = saved;
      startChat(saved);
    }
  }catch(e){}
})();
